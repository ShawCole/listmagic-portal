<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>IntentCore Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#f8f9fb;--s1:#fff;--s2:#f1f3f7;--s3:#e8ebf0;
--border:#dfe2e8;--border2:#c8cdd6;
--text:#1a1d26;--dim:#5f6577;--muted:#9198a8;
--green:#16a34a;--green-bg:rgba(22,163,74,.08);
--amber:#d97706;--amber-bg:rgba(217,119,6,.08);
--red:#dc2626;--red-bg:rgba(220,38,38,.08);
--blue:#2563eb;--blue-bg:rgba(37,99,235,.06);--blue-b:rgba(37,99,235,.15);
--violet:#7c3aed;--violet-bg:rgba(124,58,237,.06);
--mono:'IBM Plex Mono',monospace;--sans:'DM Sans',sans-serif;
--sidebar-w:220px;
}
html{font-size:13.5px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex}

/* ── Sidebar ── */
.sidebar{width:var(--sidebar-w);background:var(--s1);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:10}
.sidebar-logo{padding:1.1rem 1rem .7rem;border-bottom:1px solid var(--border)}
.sidebar-logo h1{font-family:var(--mono);font-size:.95rem;font-weight:700;letter-spacing:-.02em}
.sidebar-logo h1 .accent{color:var(--blue)}
.sidebar-logo .sub{font-size:.6rem;color:var(--muted);margin-top:.15rem;font-family:var(--mono)}

/* Tenant selector */
.tenant-selector{padding:.7rem 1rem;border-bottom:1px solid var(--border)}
.tenant-selector label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);display:block;margin-bottom:.3rem}
.tenant-selector select{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:.4rem .5rem;font-size:.78rem;color:var(--text);font-family:var(--sans);outline:none;cursor:pointer}
.tenant-selector select:focus{border-color:var(--blue)}

/* Nav items */
.sidebar-section{padding:.6rem 0}
.sidebar-section-title{font-size:.55rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:0 1rem .3rem}
.nav-item{display:flex;align-items:center;gap:.55rem;padding:.45rem 1rem;cursor:pointer;transition:all .12s;border-left:3px solid transparent;font-size:.82rem;color:var(--dim)}
.nav-item:hover{background:var(--s2);color:var(--text)}
.nav-item.active{background:var(--blue-bg);color:var(--blue);border-left-color:var(--blue);font-weight:600}
.nav-item .icon{font-size:.75rem;width:16px;text-align:center}
.nav-item .badge{margin-left:auto;font-family:var(--mono);font-size:.6rem;background:var(--s2);padding:.1rem .35rem;border-radius:3px;color:var(--muted)}
.nav-item.active .badge{background:rgba(37,99,235,.1);color:var(--blue)}
.nav-item.disabled{opacity:.4;cursor:default;pointer-events:none}

.sidebar-footer{margin-top:auto;padding:.8rem 1rem;border-top:1px solid var(--border);font-size:.6rem;color:var(--muted);font-family:var(--mono)}

/* ── Main ── */
.main{margin-left:var(--sidebar-w);flex:1;min-height:100vh}
.topbar{background:var(--s1);border-bottom:1px solid var(--border);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:5}
.topbar h2{font-size:.95rem;font-weight:600}
.topbar .breadcrumb{font-size:.72rem;color:var(--muted);font-family:var(--mono)}
.content{padding:1.5rem}

/* ── Metrics ── */
.metrics{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.6rem;margin-bottom:1.5rem}
.mc{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:.75rem .9rem}
.mc .mv{font-family:var(--mono);font-size:1.4rem;font-weight:700;line-height:1}
.mc .ml{font-size:.6rem;color:var(--dim);margin-top:.15rem;text-transform:uppercase;letter-spacing:.04em}
.mc.blue .mv{color:var(--blue)}.mc.green .mv{color:var(--green)}.mc.violet .mv{color:var(--violet)}.mc.amber .mv{color:var(--amber)}.mc.red .mv{color:var(--red)}

/* ── Tables ── */
.tbl-controls{display:flex;gap:.5rem;margin-bottom:.7rem;align-items:center;flex-wrap:wrap}
.tbl-controls input{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:.4rem .65rem;font-size:.78rem;width:220px;outline:none;color:var(--text)}
.tbl-controls input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.08)}
.tbl-controls select{background:var(--s1);border:1px solid var(--border);border-radius:6px;padding:.4rem .45rem;font-size:.75rem;color:var(--text);outline:none}
.tbl-controls .cnt{margin-left:auto;font-family:var(--mono);font-size:.68rem;color:var(--muted)}
.tbl-wrap{background:var(--s1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{background:var(--s2);border-bottom:1px solid var(--border);padding:.5rem .65rem;text-align:left;font-size:.68rem;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.03em;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--s3);transition:background .08s}
tbody tr:hover{background:var(--s2)}
tbody tr:last-child{border-bottom:none}
td{padding:.45rem .65rem;font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:250px}
td.mono{font-family:var(--mono);font-size:.68rem;color:var(--dim)}
td.num{font-family:var(--mono);text-align:right}
td.name{font-weight:500}
.pill{display:inline-block;padding:.1rem .4rem;border-radius:4px;font-family:var(--mono);font-size:.58rem;font-weight:600}
.pill.ok{background:var(--green-bg);color:var(--green)}
.pill.warn{background:var(--amber-bg);color:var(--amber)}
.pill.err{background:var(--red-bg);color:var(--red)}
.pill.unk{background:var(--s2);color:var(--muted)}

/* ── Delete UI ── */
tr.marked-delete{background:var(--red-bg) !important;opacity:.7}
tr.marked-delete td.name{text-decoration:line-through}
.del-btn{background:none;border:1px solid var(--border);border-radius:4px;cursor:pointer;font-size:.72rem;padding:.2rem .45rem;color:var(--muted);transition:all .12s}
.del-btn:hover{border-color:var(--red);color:var(--red)}
.del-btn.active{background:var(--red-bg);border-color:var(--red);color:var(--red);font-weight:600}
.save-bar{position:sticky;top:42px;z-index:8;display:flex;gap:.4rem;align-items:center;flex-wrap:wrap;padding:.6rem .9rem;margin-bottom:.7rem;background:var(--s1);border:2px solid var(--red);border-radius:8px;box-shadow:0 2px 12px rgba(220,38,38,.12)}
.save-bar .save-btn{background:var(--red);color:#fff;border:none;border-radius:6px;padding:.5rem 1rem;font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--sans);box-shadow:0 2px 8px rgba(220,38,38,.25)}
.save-bar .save-btn:hover{background:#b91c1c}
.save-bar .save-btn.clean{background:var(--green);box-shadow:0 2px 8px rgba(22,163,74,.25)}
.save-bar .save-btn.clean:hover{background:#15803d}
.save-bar .copy-btn{background:var(--s1);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:.5rem .8rem;font-size:.78rem;cursor:pointer;font-family:var(--sans)}
.save-bar .copy-btn:hover{border-color:var(--blue);color:var(--blue)}
.save-bar .counter{font-family:var(--mono);font-size:.72rem;color:var(--red);font-weight:600}
td.id-col{font-family:var(--mono);font-size:.6rem;color:var(--muted);white-space:normal;word-break:break-all;min-width:260px;max-width:400px}
.id-badge{display:inline-block;font-size:.5rem;padding:.08rem .3rem;border-radius:3px;font-weight:700;margin-right:.3rem;vertical-align:middle}
.id-badge.real{background:var(--green-bg);color:var(--green)}
.id-badge.generated{background:var(--amber-bg);color:var(--amber)}

/* ── Select checkboxes ── */
td.sel-col,th.sel-col{width:28px;min-width:28px;max-width:28px;text-align:center;padding:.45rem .3rem}
td.sel-col input,th.sel-col input{cursor:pointer;width:14px;height:14px;accent-color:var(--blue)}
tr.row-selected{background:var(--blue-bg) !important}
tr.marked-delete.row-selected{background:var(--red-bg) !important}

/* ── Tenant grid ── */
.tenant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:.6rem}
.tc{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:.9rem;cursor:pointer;transition:all .12s}
.tc:hover{border-color:var(--blue-b);box-shadow:0 1px 6px rgba(37,99,235,.06)}
.tc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem}
.tc-name{font-weight:600;font-size:.85rem}
.tc-badge{font-family:var(--mono);font-size:.5rem;padding:.12rem .35rem;border-radius:4px;font-weight:600;background:var(--s2);color:var(--muted)}
.tc-badge.parent{background:var(--blue-bg);color:var(--blue)}
.tc-row{display:flex;justify-content:space-between;font-size:.75rem;padding:.15rem 0;color:var(--dim)}
.tc-row span:last-child{font-weight:600;color:var(--text)}
.tc-row .link{color:var(--blue);cursor:pointer;text-decoration:underline}

/* ── Coming soon ── */
.coming-soon{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 2rem;text-align:center}
.coming-soon h3{font-size:1.1rem;margin-bottom:.5rem}
.coming-soon p{color:var(--dim);font-size:.85rem;max-width:400px;line-height:1.5}

::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
@media(max-width:768px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head><body>

<div class="sidebar" id="sidebar"></div>
<div class="main">
  <div class="topbar">
    <h2 id="page-title">Dashboard</h2>
    <div class="breadcrumb" id="breadcrumb"></div>
  </div>
  <div class="content" id="content"></div>
</div>

<script>
var D = null;
var page = 'dashboard';
var tenant = ''; // workspace slug filter
var deleteSet = {}; // {audienceId: {id, name, workspace}}
var selectSet = {}; // {audienceId: true} — row selection for copy/download
var serverDeleteSet = '{}'; // JSON snapshot of last saved state
var dirty = false; // true if local deleteSet differs from server
var currentRows = []; // currently displayed audience rows for select-all

// Load delete selections from server file, URL hash, or localStorage
function loadDeleteState(){
  var h=location.hash;
  if(h&&h.indexOf('#delete=')===0){
    var ids=decodeURIComponent(h.substring(8)).split(',');
    ids.forEach(function(id){if(id)deleteSet[id]={id:id,name:'',workspace:''}});
  } else {
    try{var s=localStorage.getItem('lm-delete-set');if(s)deleteSet=JSON.parse(s)}catch(e){}
  }
  // Also load persisted server state
  fetch('data/deletions.json').then(function(r){if(r.ok)return r.json();throw 0}).then(function(data){
    if(data&&data.marked_for_deletion){
      var serverSet={};
      data.marked_for_deletion.forEach(function(a){if(a.id){serverSet[a.id]=a;if(!deleteSet[a.id])deleteSet[a.id]=a}});
      serverDeleteSet=JSON.stringify(serverSet);
      checkDirty();
      updateSaveBar();
      if(page==='audiences')render();
    }
  }).catch(function(){});
}
function checkDirty(){
  var localKeys=Object.keys(deleteSet).sort().join(',');
  var serverKeys=Object.keys(JSON.parse(serverDeleteSet)).sort().join(',');
  dirty=(localKeys!==serverKeys);
}
function saveDeleteState(){
  try{localStorage.setItem('lm-delete-set',JSON.stringify(deleteSet))}catch(e){}
  var ids=Object.keys(deleteSet);
  if(ids.length)location.hash='delete='+encodeURIComponent(ids.join(','));
  else if(location.hash)history.replaceState(null,'',location.pathname+location.search);
  checkDirty();
  updateSaveBar();
}
function toggleDelete(a){
  if(deleteSet[a.id])delete deleteSet[a.id];
  else deleteSet[a.id]={id:a.id,name:a.name,workspace:a.workspace};
  saveDeleteState();
}
function toggleSelect(id){
  if(selectSet[id])delete selectSet[id];
  else selectSet[id]=true;
  updateSaveBar();
}
function getDeleteCount(){return Object.keys(deleteSet).length}
function getSelectCount(){return Object.keys(selectSet).length}
function selectAll(){
  currentRows.forEach(function(a){selectSet[a.id]=true});
  if(page==='audiences')render();
  updateSaveBar();
}
function selectNone(){
  selectSet={};
  if(page==='audiences')render();
  updateSaveBar();
}
function selectMarked(){
  selectSet={};
  Object.keys(deleteSet).forEach(function(id){selectSet[id]=true});
  if(page==='audiences')render();
  updateSaveBar();
}
function getSelectedIds(){
  return Object.keys(selectSet);
}
function updateSaveBar(){
  var bar=document.getElementById('save-bar');
  if(!bar)return;
  var delCnt=getDeleteCount();
  var selCnt=getSelectCount();
  // Always show the bar on audiences page - style changes based on state
  bar.style.borderColor=delCnt>0?'var(--red)':'var(--border)';
  bar.style.boxShadow=delCnt>0?'0 2px 12px rgba(220,38,38,.12)':'none';
  var counter=document.getElementById('bar-counter');
  if(counter){
    if(delCnt>0){
      counter.textContent=delCnt+' marked for deletion';
      counter.style.color='var(--red)';
      if(dirty)counter.textContent+=' \u2022 unsaved changes';
    } else {
      counter.textContent='No audiences marked for deletion';
      counter.style.color='var(--muted)';
    }
  }
  var selSpan=document.getElementById('bar-selected');
  if(selSpan)selSpan.textContent=selCnt>0?'\u2022 '+selCnt+' selected':'';
  // Style save button based on dirty state
  var saveBtn=bar.querySelector('.save-btn');
  if(saveBtn){
    if(dirty){saveBtn.classList.remove('clean');saveBtn.textContent='Save & Deploy';saveBtn.disabled=false}
    else if(delCnt>0){saveBtn.classList.add('clean');saveBtn.textContent='Saved';saveBtn.disabled=false}
    else{saveBtn.classList.remove('clean');saveBtn.textContent='Save & Deploy';saveBtn.disabled=true}
  }
}
loadDeleteState();

function $(id){return document.getElementById(id)}
function ce(t,c,txt){var e=document.createElement(t);if(c)e.className=c;if(txt!==undefined)e.textContent=String(txt);return e}
function fmt(n){return n?Number(n).toLocaleString():'-'}
function isRealId(id){return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/.test(id)}

function fetchJson(file){return fetch('data/'+file).then(function(r){return r.json()})}

function nav(p,t){page=p;if(t!==undefined)tenant=t;buildSidebar();render()}

// ── Sidebar ──
function buildSidebar(){
  var sb=$('sidebar');while(sb.firstChild)sb.removeChild(sb.firstChild);

  // Logo
  var logo=ce('div','sidebar-logo');
  var h1=ce('h1','');
  var acc=ce('span','accent','Intent');h1.appendChild(acc);h1.appendChild(document.createTextNode('Core'));
  logo.appendChild(h1);
  logo.appendChild(ce('div','sub','Command Center'));
  sb.appendChild(logo);

  // Tenant dropdown
  var ts=ce('div','tenant-selector');
  ts.appendChild(ce('label','','Tenant'));
  var sel=document.createElement('select');sel.id='tenant-sel';
  var optAll=document.createElement('option');optAll.value='';optAll.textContent='All Tenants ('+((D&&D.tenantSummary)?D.tenantSummary.withData:0)+')';sel.appendChild(optAll);
  if(D&&D.tenants){
    D.tenants.filter(function(t){return t.audienceCount>0||t.pixelCount>0}).sort(function(a,b){return(b.audienceCount+b.pixelCount)-(a.audienceCount+a.pixelCount)}).forEach(function(t){
      var o=document.createElement('option');o.value=t.slug;o.textContent=t.name+' ('+t.audienceCount+'A / '+t.pixelCount+'P)';sel.appendChild(o);
    });
  }
  sel.value=tenant;
  sel.onchange=function(){tenant=sel.value;render()};
  ts.appendChild(sel);
  sb.appendChild(ts);

  // Navigation
  var sec=ce('div','sidebar-section');
  sec.appendChild(ce('div','sidebar-section-title','Data'));
  var pages=[
    ['dashboard','\u25A6','Dashboard',''],
    ['audiences','\u25A4','Audiences',D?D.audienceStats.total:''],
    ['pixels','\u25C9','Pixels',D?D.pixelStats.dbPixelCount:''],
  ];
  pages.forEach(function(p){
    var item=ce('div','nav-item'+(page===p[0]?' active':''));
    item.appendChild(ce('span','icon',p[1]));
    item.appendChild(ce('span','',p[2]));
    if(p[3])item.appendChild(ce('span','badge',String(p[3])));
    item.onclick=function(){nav(p[0])};
    sec.appendChild(item);
  });
  sb.appendChild(sec);

  // Tools section
  var sec2=ce('div','sidebar-section');
  sec2.appendChild(ce('div','sidebar-section-title','Tools'));
  [['maps','\u25CB','Map Visualizer'],['automations','\u26A1','Automations'],['reports','\u25B6','Reports']].forEach(function(p){
    var item=ce('div','nav-item'+(page===p[0]?' active':'')+' disabled');
    item.appendChild(ce('span','icon',p[1]));
    item.appendChild(ce('span','',p[2]));
    item.appendChild(ce('span','badge','Soon'));
    sec2.appendChild(item);
  });
  sb.appendChild(sec2);

  // Integrations section
  var sec3=ce('div','sidebar-section');
  sec3.appendChild(ce('div','sidebar-section-title','Integrations'));
  [['gohighlevel','\u2B21','GoHighLevel'],['sheets','\u25A3','Google Sheets'],['meta','\u25C6','Meta Ads']].forEach(function(p){
    var item=ce('div','nav-item disabled');
    item.appendChild(ce('span','icon',p[1]));
    item.appendChild(ce('span','',p[2]));
    item.appendChild(ce('span','badge','Soon'));
    sec3.appendChild(item);
  });
  sb.appendChild(sec3);

  // Admin section
  var sec4=ce('div','sidebar-section');
  sec4.appendChild(ce('div','sidebar-section-title','Admin'));
  [['clients','\u263A','Client Access'],['settings','\u2699','Settings']].forEach(function(p){
    var item=ce('div','nav-item'+(page===p[0]?' active':'')+' disabled');
    item.appendChild(ce('span','icon',p[1]));
    item.appendChild(ce('span','',p[2]));
    item.appendChild(ce('span','badge','Soon'));
    sec4.appendChild(item);
  });
  sb.appendChild(sec4);

  // Footer
  var ft=ce('div','sidebar-footer');
  ft.textContent='v0.1.0 \u00B7 VPS: 100.68.171.99';
  sb.appendChild(ft);
}

// ── Render ──
function render(){
  var c=$('content');while(c.firstChild)c.removeChild(c.firstChild);
  var tn=tenant&&D?D.tenants.find(function(t){return t.slug===tenant}):null;
  $('breadcrumb').textContent=tn?'Tenant: '+tn.name:'All Tenants';

  if(page==='dashboard') renderDashboard(c);
  else if(page==='audiences') renderAudiences(c);
  else if(page==='pixels') renderPixels(c);
}

// ── Dashboard ──
function renderDashboard(c){
  $('page-title').textContent='Dashboard';

  var m=ce('div','metrics');
  var tenantCount=D?D.tenantSummary.withData:0;
  var audCount=D?D.audienceStats.total:0;
  var pxCount=D?D.pixelStats.dbPixelCount:0;
  var totalSize=D?fmt(D.audienceStats.totalSize):'0';

  // If tenant selected, compute filtered stats
  if(tenant&&D){
    var t=D.tenants.find(function(x){return x.slug===tenant});
    if(t){tenantCount=1;audCount=t.audienceCount;pxCount=t.pixelCount;totalSize=fmt(t.audienceTotalSize||0);}
  }

  [[tenantCount,'Tenants','blue'],[audCount,'Audiences','green'],[pxCount,'Pixels','violet'],[totalSize,'Total Records','blue']].forEach(function(it){
    var card=ce('div','mc '+it[2]);card.appendChild(ce('div','mv',String(it[0])));card.appendChild(ce('div','ml',it[1]));m.appendChild(card);
  });
  c.appendChild(m);

  // Tenant grid (only if no specific tenant selected)
  if(!tenant&&D){
    var tg=ce('div','tenant-grid');
    D.tenants.filter(function(t){return t.audienceCount>0||t.pixelCount>0}).sort(function(a,b){return(b.audienceCount+b.pixelCount)-(a.audienceCount+a.pixelCount)}).forEach(function(t){
      var card=ce('div','tc');

      var hdr=ce('div','tc-header');
      hdr.appendChild(ce('div','tc-name',t.name));
      hdr.appendChild(ce('div','tc-badge'+(t.isParent?' parent':''),t.isParent?'PARENT':'TENANT'));
      card.appendChild(hdr);

      var r1=ce('div','tc-row');r1.appendChild(ce('span','','Audiences'));
      var a1=ce('span',t.audienceCount>0?'link':'',String(t.audienceCount));
      if(t.audienceCount>0)a1.onclick=function(e){e.stopPropagation();nav('audiences',t.slug)};
      r1.appendChild(a1);card.appendChild(r1);

      var r2=ce('div','tc-row');r2.appendChild(ce('span','','Pixels'));
      var p1=ce('span',t.pixelCount>0?'link':'',String(t.pixelCount));
      if(t.pixelCount>0)p1.onclick=function(e){e.stopPropagation();nav('pixels',t.slug)};
      r2.appendChild(p1);card.appendChild(r2);

      if(t.partner){var r3=ce('div','tc-row');r3.appendChild(ce('span','','Partner'));r3.appendChild(ce('span','',t.partner));card.appendChild(r3);}

      card.onclick=function(){tenant=t.slug;var sel=$('tenant-sel');if(sel)sel.value=t.slug;render()};
      tg.appendChild(card);
    });
    c.appendChild(tg);
  } else if(tenant&&D){
    // Show selected tenant detail with audience + pixel summaries
    var t=D.tenants.find(function(x){return x.slug===tenant});
    if(t){
      var info=ce('div','');info.style.cssText='margin-bottom:1.5rem';

      var audBtn=ce('div','tc');audBtn.style.cssText='display:inline-block;margin-right:.5rem;cursor:pointer;min-width:200px';
      audBtn.appendChild(ce('div','tc-name','Audiences'));
      var ar=ce('div','tc-row');ar.appendChild(ce('span','','Total'));ar.appendChild(ce('span','link',String(t.audienceCount)));audBtn.appendChild(ar);
      audBtn.onclick=function(){nav('audiences',tenant)};

// ── Audiences ──
function renderAudiences(c){
  var tn=tenant&&D?D.tenants.find(function(t){return t.slug===tenant}):null;
  $('page-title').textContent=tn?'Audiences \u2014 '+tn.name:'All Audiences';

  var controls=ce('div','tbl-controls');
  var search=ce('input','');search.placeholder='Search audiences...';
  controls.appendChild(search);
  var sortSel=ce('select','');
  [['audience_size','Size'],['name','Name'],['status','Status'],['workspace','Tenant']].forEach(function(o){var op=document.createElement('option');op.value=o[0];op.textContent=o[1];sortSel.appendChild(op)});
  controls.appendChild(sortSel);
  var orderSel=ce('select','');
  [['desc','DESC'],['asc','ASC']].forEach(function(o){var op=document.createElement('option');op.value=o[0];op.textContent=o[1];orderSel.appendChild(op)});
  controls.appendChild(orderSel);
  var idFilter=ce('select','');
  [['all','All IDs'],['uuid','UUID only'],['name','Name-based only'],['marked','Marked for deletion']].forEach(function(o){var op=document.createElement('option');op.value=o[0];op.textContent=o[1];idFilter.appendChild(op)});
  controls.appendChild(idFilter);

  // Select controls
  var selGroup=ce('div','');selGroup.style.cssText='display:flex;gap:.3rem;margin-left:.5rem';
  var btnAll=ce('button','copy-btn');btnAll.textContent='Select All';btnAll.style.cssText='font-size:.68rem;padding:.25rem .5rem';btnAll.onclick=selectAll;selGroup.appendChild(btnAll);
  var btnNone=ce('button','copy-btn');btnNone.textContent='Select None';btnNone.style.cssText='font-size:.68rem;padding:.25rem .5rem';btnNone.onclick=selectNone;selGroup.appendChild(btnNone);
  var btnMarked=ce('button','copy-btn');btnMarked.textContent='Select Marked';btnMarked.style.cssText='font-size:.68rem;padding:.25rem .5rem;color:var(--red)';btnMarked.onclick=selectMarked;selGroup.appendChild(btnMarked);
  controls.appendChild(selGroup);

  controls.appendChild(ce('div','cnt',''));
  c.appendChild(controls);

  // Action bar — always present on audiences page
  var bar=ce('div','save-bar');bar.id='save-bar';
  var barCounter=ce('span','counter');barCounter.id='bar-counter';barCounter.textContent='0 marked for deletion';bar.appendChild(barCounter);
  var barSelected=ce('span','counter');barSelected.id='bar-selected';barSelected.style.color='var(--blue)';bar.appendChild(barSelected);
  var spacer=ce('div','');spacer.style.cssText='flex:1';bar.appendChild(spacer);
  var saveBtn=ce('button','save-btn');saveBtn.textContent='Save & Deploy';saveBtn.onclick=saveSelections;bar.appendChild(saveBtn);
  var copyIdsBtn=ce('button','copy-btn');copyIdsBtn.textContent='Copy Selected IDs';copyIdsBtn.onclick=copySelectedIds;bar.appendChild(copyIdsBtn);
  var dlBtn=ce('button','copy-btn');dlBtn.textContent='Download IDs';dlBtn.onclick=downloadSelectedIds;bar.appendChild(dlBtn);
  var copyJsonBtn=ce('button','copy-btn');copyJsonBtn.textContent='Copy JSON';copyJsonBtn.onclick=copyDeletionList;bar.appendChild(copyJsonBtn);
  var copyLinkBtn=ce('button','copy-btn');copyLinkBtn.textContent='Copy Link';copyLinkBtn.onclick=copyShareLink;bar.appendChild(copyLinkBtn);
  c.appendChild(bar);
  updateSaveBar();

  var wrap=ce('div','tbl-wrap');
  var tbl=ce('table','');tbl.style.tableLayout='auto';var thead=ce('thead','');var hr=ce('tr','');
  // Select-all checkbox header
  var thSel=ce('th','sel-col');
  var selAllCb=document.createElement('input');selAllCb.type='checkbox';selAllCb.title='Select all visible';
  selAllCb.onchange=function(){if(selAllCb.checked)selectAll();else selectNone()};
  thSel.appendChild(selAllCb);hr.appendChild(thSel);
  ['ID','Name','Tenant','Status','Size','Refreshes','Created','Last Refreshed','Delete'].forEach(function(h){hr.appendChild(ce('th','',h))});
  thead.appendChild(hr);tbl.appendChild(thead);
  var tbody=ce('tbody','');tbl.appendChild(tbody);wrap.appendChild(tbl);c.appendChild(wrap);

  function load(){
    fetchJson('audiences.json').then(function(data){
      var rows=data.audiences||[];
      var ws=tenant;
      if(ws)rows=rows.filter(function(a){return a.workspace===ws});
      var q=search.value.toLowerCase();
      if(q)rows=rows.filter(function(a){return a.name.toLowerCase().includes(q)});
      var idf=idFilter.value;
      if(idf==='uuid')rows=rows.filter(function(a){return isRealId(a.id)});
      else if(idf==='name')rows=rows.filter(function(a){return !isRealId(a.id)});
      else if(idf==='marked')rows=rows.filter(function(a){return !!deleteSet[a.id]});
      var col=sortSel.value;var ord=orderSel.value;
      rows.sort(function(a,b){var av=a[col]||'',bv=b[col]||'';if(typeof av==='number'||col==='audience_size')return ord==='desc'?(bv||0)-(av||0):(av||0)-(bv||0);return ord==='desc'?String(bv).localeCompare(String(av)):String(av).localeCompare(String(bv))});
      currentRows=rows;

      while(tbody.firstChild)tbody.removeChild(tbody.firstChild);
      rows.forEach(function(a){
        var tr=ce('tr','');
        var cls=[];
        if(deleteSet[a.id])cls.push('marked-delete');
        if(selectSet[a.id])cls.push('row-selected');
        tr.className=cls.join(' ');

        // Select checkbox
        var tdSel=ce('td','sel-col');
        var cb=document.createElement('input');cb.type='checkbox';cb.checked=!!selectSet[a.id];
        cb.onchange=(function(aud,row,checkbox){return function(){
          toggleSelect(aud.id);
          if(selectSet[aud.id])row.classList.add('row-selected');else row.classList.remove('row-selected');
        }})(a,tr,cb);
        tdSel.appendChild(cb);tr.appendChild(tdSel);

        var tdId=ce('td','id-col');
        var real=isRealId(a.id);
        var badge=ce('span','id-badge '+(real?'real':'generated'),real?'UUID':'NAME');
        tdId.appendChild(badge);
        tdId.appendChild(document.createTextNode(a.id||'-'));
        tr.appendChild(tdId);
        tr.appendChild(ce('td','name',a.name));
        tr.appendChild(ce('td','mono',a.workspace));
        var tdS=ce('td','');var st=a.status||'';
        tdS.appendChild(ce('span','pill '+(st.toLowerCase()==='completed'?'ok':st?'warn':'unk'),st||'Unknown'));
        tr.appendChild(tdS);
        tr.appendChild(ce('td','num',a.audience_size?fmt(a.audience_size):'-'));
        tr.appendChild(ce('td','num',a.refresh_count||'-'));
        tr.appendChild(ce('td','mono',a.created?a.created.substring(0,10):''));
        tr.appendChild(ce('td','mono',a.last_refreshed||'-'));
        var tdDel=ce('td','');
        var btn=ce('button','del-btn'+(deleteSet[a.id]?' active':''),deleteSet[a.id]?'\u2715 Undo':'\u2715');
        btn.onclick=(function(aud,row,b){return function(){
          toggleDelete(aud);
          if(deleteSet[aud.id]){row.classList.add('marked-delete');b.className='del-btn active';b.textContent='\u2715 Undo'}
          else{row.classList.remove('marked-delete');b.className='del-btn';b.textContent='\u2715'}
        }})(a,tr,btn);
        tdDel.appendChild(btn);tr.appendChild(tdDel);
        tbody.appendChild(tr);
      });
      // Backfill names and prune orphan IDs that don't exist in actual data
      var allIds={};(data.audiences||[]).forEach(function(a){allIds[a.id]=true});
      var pruned=false;
      Object.keys(deleteSet).forEach(function(id){if(!allIds[id]){delete deleteSet[id];pruned=true}});
      if(pruned){saveDeleteState()}
      rows.forEach(function(a){if(deleteSet[a.id]){deleteSet[a.id].name=a.name;deleteSet[a.id].workspace=a.workspace}});
      var cnt=c.querySelector('.cnt');if(cnt)cnt.textContent='Showing '+rows.length+(getDeleteCount()?' \u00B7 '+getDeleteCount()+' marked':'')+(getSelectCount()?' \u00B7 '+getSelectCount()+' selected':'');
      updateSaveBar();
    });
  }
  var timer;
  search.addEventListener('input',function(){clearTimeout(timer);timer=setTimeout(load,300)});
  sortSel.addEventListener('change',load);
  orderSel.addEventListener('change',load);
  idFilter.addEventListener('change',load);
  load();
}

// ── Save/Share deletion selections ──
function saveSelections(){
  saveDeleteState();
  var list=Object.values(deleteSet);
  var payload={marked_for_deletion:list,count:list.length,saved_at:new Date().toISOString()};
  var btn=document.querySelector('.save-btn');
  if(btn){btn.textContent='Saving...';btn.disabled=true}
  fetch('/.netlify/functions/save-deletions',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload)
  }).then(function(r){return r.json()}).then(function(data){
    if(data.success){
      // Update server snapshot so dirty flag clears
      var snap={};list.forEach(function(a){snap[a.id]=a});
      serverDeleteSet=JSON.stringify(snap);
      dirty=false;
      updateSaveBar();
      alert('Saved '+list.length+' audience'+(list.length===1?'':'s')+' marked for deletion.\nState committed to repo and redeploy triggered.\n\nThe selections will persist for anyone who visits the site.');
    } else {
      alert('Save failed: '+(data.error||'Unknown error')+'\n\nSelections are still saved locally.');
    }
  }).catch(function(e){
    alert('Could not reach save endpoint.\nSelections saved locally only.\n\n'+e);
  }).finally(function(){
    updateSaveBar();
  });
}
function buildSelectedExport(){
  var ids=getSelectedIds();
  if(!ids.length)return null;
  var realIds=[],genEntries=[];
  ids.forEach(function(id){
    if(isRealId(id)){realIds.push(id)}
    else{
      var info=deleteSet[id];
      var name=info?info.name:'';var ws=info?info.workspace:'';
      // Try to find in currentRows for better data
      for(var i=0;i<currentRows.length;i++){if(currentRows[i].id===id){name=currentRows[i].name;ws=currentRows[i].workspace;break}}
      genEntries.push({id:id,name:name,workspace:ws});
    }
  });
  return{realIds:realIds,genEntries:genEntries,total:ids.length};
}
function copySelectedIds(){
  var exp=buildSelectedExport();
  if(!exp){alert('No audiences selected. Use checkboxes or "Select All" / "Select Marked" first.');return}
  var lines=[];
  if(exp.realIds.length)lines.push('# Real UUIDs ('+exp.realIds.length+')\n'+exp.realIds.join(','));
  if(exp.genEntries.length){
    lines.push('\n# Name-based IDs — need manual lookup ('+exp.genEntries.length+')');
    exp.genEntries.forEach(function(e){lines.push(e.workspace+' | '+e.name+' | '+e.id)});
  }
  var text=lines.join('\n');
  navigator.clipboard.writeText(text).then(function(){
    var msg='Copied '+exp.total+' audience IDs.';
    if(exp.genEntries.length)msg+='\n\nNote: '+exp.genEntries.length+' have name-based IDs (marked NAME) that need manual lookup in AudienceLab.';
    alert(msg);
  });
}
function downloadSelectedIds(){
  var exp=buildSelectedExport();
  if(!exp){alert('No audiences selected. Use checkboxes or "Select All" / "Select Marked" first.');return}
  var lines=['# ListMagic Audience Selection Export','# Generated: '+new Date().toISOString(),''];
  if(exp.realIds.length){
    lines.push('## Real UUIDs ('+exp.realIds.length+') — ready for API deletion');
    lines.push(exp.realIds.join(','));
    lines.push('');
  }
  if(exp.genEntries.length){
    lines.push('## Name-based IDs ('+exp.genEntries.length+') — need manual lookup');
    lines.push('workspace | name | generated_id');
    exp.genEntries.forEach(function(e){lines.push(e.workspace+' | '+e.name+' | '+e.id)});
  }
  var text=lines.join('\n');
  var blob=new Blob([text],{type:'text/plain'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='audience-selection-'+new Date().toISOString().substring(0,10)+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}
function copyDeletionList(){
  var list=Object.values(deleteSet);
  var json=JSON.stringify({marked_for_deletion:list,count:list.length,exported:new Date().toISOString()},null,2);
  navigator.clipboard.writeText(json).then(function(){alert('Copied '+list.length+' audience deletion list to clipboard.')});
}
function copyShareLink(){
  var ids=Object.keys(deleteSet);
  if(!ids.length){alert('No audiences marked for deletion.');return}
  var url=location.origin+location.pathname+'#delete='+encodeURIComponent(ids.join(','));
  navigator.clipboard.writeText(url).then(function(){alert('Share link copied!\n\n'+ids.length+' audiences encoded in URL.')});
}

  $('content').appendChild(ce('div','coming-soon'));
  $('content').firstChild.appendChild(ce('h3','','Loading failed'));
  $('content').firstChild.appendChild(ce('p','','Check data/ directory or VPS connection.'));
});
